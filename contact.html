<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommerce - Contact</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <link href="css/contact.css" rel="stylesheet" />
</head>

<body>

  <nav>
    <a class="nav-brand" href="index.html">Ecommerce</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline"><i class="fa fa-sign-in-alt"></i> Login</a>
      <a href="register.html" class="btn btn-outline"><i class="fa fa-user-plus"></i> Register</a>
      <a href="cart.html" class="btn btn-outline"><i class="fa fa-shopping-cart"></i> Cart (0)</a>
    </div>
  </nav>

  <main>
    <div class="contact-section">

      <h1>Contact Us</h1>
      <hr />

      <div class="form-wrap">
        <form action="#" method="post">

          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Enter your message" required></textarea>
          </div>

          <div class="form-submit">
            <button type="submit" class="btn btn-grey" style="padding: 10px 36px;">Send</button>
          </div>

        </form>
      </div>

    </div>
  </main>

  <footer>
    Made with <span style="color:#dc3545;">&#10084;</span> by <a href="#">krishna sree</a>
  </footer>

</body>

</html>
